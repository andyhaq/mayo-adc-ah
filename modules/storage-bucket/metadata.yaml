#apiVersion: designcenter.googleapis.com/v1
#kind: TemplateMetadata
#metadata:
#  name: storage-bucket-template

#spec: {}

apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: storage-bucket-template
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: Cloud Storage Bucket
    source:
      repo: https://github.com/andyhaq/mayo-adc-ah.git
      sourceType: git
    actuationTool:
      flavor: Terraform
      version: ">= 1.3"
    description:
      tagline: Creates a Cloud Storage bucket with uniform bucket-level access.
  interfaces:
    variables:
      - name: bucket_name
        description: Globally unique name for the bucket.
        varType: string
        required: true
      - name: project_id
        description: Project where the bucket is created.
        varType: string
        required: true
      - name: region
        description: Location for the bucket.
        varType: string
        required: true
    outputs:
      - name: name
        description: The name of the created bucket.
        type: string
      - name: url
        description: The URL of the created bucket.
        type: string
  requirements:
    roles:
      - level: Project
        roles:
          - roles/storage.admin
    services:
      - storage.googleapis.com
    providerVersions:
      - source: hashicorp/google
        version: ">= 6, < 7"
  ui:
    input:
      variables:
        bucket_name:
          name: bucket_name
          title: Bucket Name
        project_id:
          name: project_id
          title: Target Project
        region:
          name: region
          title: Bucket Region
